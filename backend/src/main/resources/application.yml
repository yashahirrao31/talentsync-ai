spring:
  application:
    name: ats-resume-checker

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:atscheck}}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-must-be-at-least-256-bits-long-for-hs256}
  expiration-ms: 86400000  # 24 hours

# AWS S3
aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET:ats-resume-checker-uploads}
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
  presigned-url-expiry-minutes: 60

# Google Gemini
gemini:
  api-key: ${GEMINI_API_KEY:your-gemini-api-key-here}
  model: gemini-1.5-pro
  api-url: https://generativelanguage.googleapis.com/v1beta/models

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost,http://localhost:80,http://localhost:5173,http://localhost:3000,http://127.0.0.1,http://127.0.0.1:80,https://talentsync-ai-one.vercel.app}

# Logging
logging:
  level:
    com.atscheck: INFO
    org.springframework.security: WARN

# Admin
admin:
  email: ${ADMIN_EMAIL:}
